<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Main Menu</title>
    <style>
        body {
            background: #f3f3f3;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            background: #fff;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 48px 32px 48px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 1.7em;
            color: #005288;
            font-weight: 500;
            margin-bottom: 36px;
        }
        .sap-link {
            display: block;
            width: 260px;
            margin: 12px 0;
            padding: 14px 0;
            text-align: center;
            background: #e7f3fa;
            color: #005288;
            border: 1px solid #b6d2e6;
            border-radius: 4px;
            font-size: 1.08em;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }
        .sap-link:hover {
            background: #0070b8;
            color: #fff;
        }
        @media (max-width: 650px) {
            .container {padding: 12px;}
            .sap-link {width: 100%;}
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Main Menu</h1>
    <a class="sap-link" href="form.html">Forms</a>
    <a class="sap-link" href="scrapping.html">Scrapping</a>
    <a class="sap-link" href="#">WIP</a>
</div>
</body>
</html>
