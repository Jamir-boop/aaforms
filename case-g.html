<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Case G — No IDs, addEventListener only</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Case G — addEventListener only, no IDs / no names</h1>
    <p class="desc">
        Zero inline handlers, zero <code>id</code>, zero <code>name</code>. All wiring is done
        via DOM traversal and <code>addEventListener</code>. There is no stable anchor for
        selectors at all — the recorder must rely on structure or coordinates.
    </p>
    <form autocomplete="off">
        <div class="fg"><label>Name</label><input type="text" maxlength="40" required></div>
        <div class="fg"><label>Country</label><input type="text" maxlength="32" required></div>
        <div class="fg"><label>Favorite Automation Feature</label><input type="text" maxlength="64" required></div>
        <div class="fg"><label>Gender</label><div class="rg">
            <input type="radio" value="Male" required><label>Male</label>
            <input type="radio" value="Female"><label>Female</label>
            <input type="radio" value="Other"><label>Other</label>
        </div></div>
        <div class="fg"><label>Is Awesome?</label><div class="cg"><input type="checkbox"><label style="margin-bottom:0;">Yes</label></div></div>
        <div class="fg"><label>Favorite Bot Type</label><select required>
            <option value="">Select...</option><option>Task Bot</option><option>Automation Co-Pilot</option><option>AI Guardrails</option><option>Enterprise Knowledge</option><option>Document Automation</option>
        </select></div>
        <div class="act"><button type="submit">Add Person</button></div>
    </form>
    <div id="list"></div>
    <a class="back" href="index.html">&larr; Back to Main Menu</a>
</div>
<script>
    var rows = [];
    var f = document.querySelector('form');
    var texts = f.querySelectorAll('input[type=text]');
    f.addEventListener('submit', function(e){
        e.preventDefault();
        var g = f.querySelector('input[type=radio]:checked');
        var row = {name:texts[0].value.trim(),country:texts[1].value.trim(),feature:texts[2].value.trim(),gender:g?g.value:'',awesome:f.querySelector('input[type=checkbox]').checked,bot:f.querySelector('select').value};
        if(!row.name||!row.country||!row.feature||!row.gender||!row.bot)return;
        rows.push(row);render();f.reset();
    });
    function render(){
        var l=document.getElementById('list');
        if(!rows.length){l.innerHTML='<div class="empty">No people yet. Add someone above.</div>';return;}
        var h='<table><thead><tr><th>Name</th><th>Country</th><th>Feature</th><th>Gender</th><th>Awesome</th><th>Bot Type</th></tr></thead><tbody>';
        for(var i=0;i<rows.length;i++){var r=rows[i];h+='<tr><td>'+r.name+'</td><td>'+r.country+'</td><td>'+r.feature+'</td><td>'+r.gender+'</td><td>'+(r.awesome?'Yes':'No')+'</td><td>'+r.bot+'</td></tr>';}
        h+='</tbody></table>';l.innerHTML=h;
    }
    render();
</script>
</body>
</html>
