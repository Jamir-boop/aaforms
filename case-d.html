<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Case D — Randomized IDs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Case D — Randomized IDs (change each load)</h1>
    <p class="desc">
        Every <code>id</code> and <code>name</code> gets a random suffix on load. Click
        <code>Regenerate IDs</code> to re-randomize without reloading — any selector captured
        before that moment now fails.
    </p>
    <button class="rebtn" id="rebtn">Regenerate IDs</button>
    <form id="f" autocomplete="off">
        <div class="fg"><label data-for="name">Name</label><input data-field="name" type="text" maxlength="40" required></div>
        <div class="fg"><label data-for="country">Country</label><input data-field="country" type="text" maxlength="32" required></div>
        <div class="fg"><label data-for="feature">Favorite Automation Feature</label><input data-field="feature" type="text" maxlength="64" required></div>
        <div class="fg"><label>Gender</label><div class="rg">
            <input type="radio" data-field="gender" value="Male" required><label data-for="gender-male">Male</label>
            <input type="radio" data-field="gender" value="Female"><label data-for="gender-female">Female</label>
            <input type="radio" data-field="gender" value="Other"><label data-for="gender-other">Other</label>
        </div></div>
        <div class="fg"><label>Is Awesome?</label><div class="cg"><input type="checkbox" data-field="awesome"><label data-for="awesome" style="margin-bottom:0;">Yes</label></div></div>
        <div class="fg"><label data-for="bot">Favorite Bot Type</label><select data-field="bot" required>
            <option value="">Select...</option><option>Task Bot</option><option>Automation Co-Pilot</option><option>AI Guardrails</option><option>Enterprise Knowledge</option><option>Document Automation</option>
        </select></div>
        <div class="act"><button type="submit">Add Person</button></div>
    </form>
    <div id="list"></div>
    <a class="back" href="index.html">&larr; Back to Main Menu</a>
</div>
<script>
    var rows = [];
    var f = document.getElementById('f');
    function suf(){return Math.random().toString(36).slice(2,7);}
    function applyIds(){
        var s = suf();
        f.querySelectorAll('[data-field]').forEach(function(el){
            var b = el.getAttribute('data-field');
            el.id = b + '_' + s;
            if(el.type === 'radio'){el.name = 'gender_' + s;}
            else if(el.tagName === 'SELECT' || el.type === 'text'){el.name = b + '_' + s;}
        });
        f.querySelectorAll('[data-for]').forEach(function(l){
            l.setAttribute('for', l.getAttribute('data-for') + '_' + s);
        });
    }
    applyIds();
    document.getElementById('rebtn').addEventListener('click', applyIds);
    f.addEventListener('submit', function(e){
        e.preventDefault();
        var q = f.querySelector.bind(f);
        var g = q('input[type=radio]:checked');
        var row = {name:q('[data-field=name]').value.trim(),country:q('[data-field=country]').value.trim(),feature:q('[data-field=feature]').value.trim(),gender:g?g.value:'',awesome:q('[data-field=awesome]').checked,bot:q('[data-field=bot]').value};
        if(!row.name||!row.country||!row.feature||!row.gender||!row.bot)return;
        rows.push(row);render();f.reset();
    });
    function render(){
        var l=document.getElementById('list');
        if(!rows.length){l.innerHTML='<div class="empty">No people yet. Add someone above.</div>';return;}
        var h='<table><thead><tr><th>Name</th><th>Country</th><th>Feature</th><th>Gender</th><th>Awesome</th><th>Bot Type</th></tr></thead><tbody>';
        for(var i=0;i<rows.length;i++){var r=rows[i];h+='<tr><td>'+r.name+'</td><td>'+r.country+'</td><td>'+r.feature+'</td><td>'+r.gender+'</td><td>'+(r.awesome?'Yes':'No')+'</td><td>'+r.bot+'</td></tr>';}
        h+='</tbody></table>';l.innerHTML=h;
    }
    render();
</script>
</body>
</html>
