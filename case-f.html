<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Case F — contenteditable divs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Case F — contenteditable divs</h1>
    <p class="desc">
        The text fields are <code>&lt;div contenteditable&gt;</code> instead of
        <code>&lt;input&gt;</code>. Recorders expect real inputs; type and click events on
        contenteditable elements often misbehave and value extraction breaks.
    </p>
    <form id="f" autocomplete="off">
        <div class="fg"><label>Name</label><div contenteditable="true" data-field="name" class="ce"></div></div>
        <div class="fg"><label>Country</label><div contenteditable="true" data-field="country" class="ce"></div></div>
        <div class="fg"><label>Favorite Automation Feature</label><div contenteditable="true" data-field="feature" class="ce"></div></div>
        <div class="fg"><label>Gender</label><div class="rg">
            <input type="radio" id="male" name="gender" value="Male" required><label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="Female"><label for="female">Female</label>
            <input type="radio" id="other" name="gender" value="Other"><label for="other">Other</label>
        </div></div>
        <div class="fg"><label>Is Awesome?</label><div class="cg"><input type="checkbox" id="awesome" name="awesome"><label for="awesome" style="margin-bottom:0;">Yes</label></div></div>
        <div class="fg"><label>Favorite Bot Type</label><select id="bot" name="bot" required>
            <option value="">Select...</option><option>Task Bot</option><option>Automation Co-Pilot</option><option>AI Guardrails</option><option>Enterprise Knowledge</option><option>Document Automation</option>
        </select></div>
        <div class="act"><button type="submit">Add Person</button></div>
    </form>
    <div id="list"></div>
    <a class="back" href="index.html">&larr; Back to Main Menu</a>
</div>
<script>
    var rows = [];
    var f = document.getElementById('f');
    f.addEventListener('submit', function(e){
        e.preventDefault();
        var g = f.querySelector('input[name=gender]:checked');
        var row = {name:f.querySelector('[data-field=name]').textContent.trim(),country:f.querySelector('[data-field=country]').textContent.trim(),feature:f.querySelector('[data-field=feature]').textContent.trim(),gender:g?g.value:'',awesome:f.querySelector('#awesome').checked,bot:f.querySelector('#bot').value};
        if(!row.name||!row.country||!row.feature||!row.gender||!row.bot)return;
        rows.push(row);render();
        f.querySelectorAll('[data-field]').forEach(function(el){el.textContent='';});
        f.querySelector('#awesome').checked = false;
        f.querySelectorAll('input[type=radio]').forEach(function(r){r.checked=false;});
    });
    function render(){
        var l=document.getElementById('list');
        if(!rows.length){l.innerHTML='<div class="empty">No people yet. Add someone above.</div>';return;}
        var h='<table><thead><tr><th>Name</th><th>Country</th><th>Feature</th><th>Gender</th><th>Awesome</th><th>Bot Type</th></tr></thead><tbody>';
        for(var i=0;i<rows.length;i++){var r=rows[i];h+='<tr><td>'+r.name+'</td><td>'+r.country+'</td><td>'+r.feature+'</td><td>'+r.gender+'</td><td>'+(r.awesome?'Yes':'No')+'</td><td>'+r.bot+'</td></tr>';}
        h+='</tbody></table>';l.innerHTML=h;
    }
    render();
</script>
</body>
</html>
